# NOTE: with the default GITHUB_TOKEN, GitHub suppresses events generated by
# the token, so (a) CI never runs on the release PR, which leaves it
# permanently blocked behind the required check, and (b) the published
# Release will not trigger deploy.yml, so prod does not move. Setting the
# RELEASE_PLEASE_TOKEN secret (a fine-grained PAT with contents +
# pull-requests read/write, same convention as stayintempo/tempo) makes the
# whole chain fire automatically.
name: release-please

on:
  push:
    branches: [main]

# Least privilege: open/update the release PR and cut releases.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
